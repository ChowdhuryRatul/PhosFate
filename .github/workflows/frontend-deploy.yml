name: Deploy Frontend to Cloudflare Pages

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-deploy.yml"
  workflow_dispatch:

concurrency:
  group: phosfate-frontend-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check Cloudflare secrets
        id: cloudflare-secrets
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ] || [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "deploy=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping Cloudflare Pages deploy because CLOUDFLARE_ACCOUNT_ID or CLOUDFLARE_API_TOKEN is missing."
            exit 0
          fi
          echo "deploy=true" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloudflare Pages
        if: steps.cloudflare-secrets.outputs.deploy == 'true'
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler pages deploy dist --project-name phosfate --branch main
