name: Deploy Backend to Workstation

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "Scripts/deploy-backend.sh"
      - ".github/workflows/backend-deploy.yml"
  workflow_dispatch:

concurrency:
  group: phosfate-backend-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy backend on workstation
    runs-on:
      - self-hosted
      - phosfate-workstation
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Deploy backend
        shell: bash
        run: ./Scripts/deploy-backend.sh
