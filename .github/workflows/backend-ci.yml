name: Backend CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

concurrency:
  group: phosfate-backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Node dependencies
        run: npm ci

      - name: Check Node backend syntax
        run: node --check server.js

      - name: Check Python runner syntax
        run: python -m py_compile phosfate_runner.py
